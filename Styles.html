<style>
  :root {
    --bg: #f6f7fb;
    --surface: #ffffff;
    --ink: #172033;
    --muted: #667085;
    --line: #d9deea;
    --primary: #2454d6;
    --primary-dark: #173aa0;
    --success: #12805c;
    --warning: #b54708;
    --danger: #b42318;
    --info: #026aa2;
    --shadow: 0 16px 36px rgba(23, 32, 51, 0.08);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  button, input, select, textarea { font: inherit; }
  button { cursor: pointer; }
  .app-shell { min-height: 100vh; padding: 22px; }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .eyebrow {
    color: var(--primary);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    margin: 0 0 4px;
    text-transform: uppercase;
  }
  h1, h2, h3, p { margin-top: 0; }
  h1 { margin-bottom: 0; font-size: 28px; }
  h2 { font-size: 17px; }
  h3 { font-size: 15px; margin-bottom: 8px; }
  .topbar-actions { display: flex; gap: 10px; }
  .primary, .ghost, .icon-btn {
    border: 1px solid transparent;
    border-radius: 7px;
    min-height: 40px;
    padding: 0 14px;
    font-weight: 700;
  }
  .primary { background: var(--primary); color: white; }
  .primary:hover { background: var(--primary-dark); }
  .ghost { background: white; color: var(--ink); border-color: var(--line); }
  .icon-btn { width: 38px; padding: 0; background: #f2f4f7; color: var(--ink); }

  .filters {
    display: grid;
    grid-template-columns: minmax(240px, 1.8fr) repeat(6, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  input, select, textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: white;
    color: var(--ink);
    min-height: 40px;
    padding: 9px 11px;
  }
  textarea { min-height: 90px; resize: vertical; }

  .crm-grid {
    display: grid;
    grid-template-columns: 360px minmax(460px, 1fr) 310px;
    gap: 14px;
    align-items: start;
  }
  .ticket-list, .ticket-detail, .insights {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    min-height: calc(100vh - 150px);
    box-shadow: var(--shadow);
  }
  .ticket-list { overflow: auto; max-height: calc(100vh - 150px); }
  .ticket-card {
    border-bottom: 1px solid var(--line);
    padding: 14px;
    display: grid;
    gap: 8px;
  }
  .ticket-card:hover, .ticket-card.active { background: #f8faff; }
  .ticket-card strong { font-size: 15px; }
  .ticket-meta, .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .muted, .ticket-meta { color: var(--muted); font-size: 13px; }
  .badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }
  .status-pending { background: #fff3cd; color: #7a4b00; }
  .status-in-progress { background: #dbeafe; color: #1d4ed8; }
  .status-waiting-on-third-party, .status-waiting-on-customer { background: #fef0c7; color: var(--warning); }
  .status-resolved { background: #d1fadf; color: var(--success); }
  .level-critical { background: #fee4e2; color: var(--danger); }
  .level-l1, .level-l2, .level-l3 { background: #e0f2fe; color: var(--info); }
  .level-none { background: #eef2f6; color: #475467; }

  .ticket-detail { padding: 18px; }
  .detail-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 16px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .field {
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 11px;
    background: #fcfcfd;
  }
  .field span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
  .wide { grid-column: 1 / -1; }
  .edit-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .edit-grid label { font-size: 13px; color: var(--muted); }
  .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

  .insights { padding: 14px; }
  .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  .metric-grid article {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    background: #fcfcfd;
  }
  .metric-grid span { font-size: 24px; font-weight: 900; }
  .metric-grid p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
  .panel-block { border-top: 1px solid var(--line); padding-top: 14px; margin-top: 14px; }
  .bucket { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eef2f6; }
  .empty-state { display: grid; place-items: center; align-content: center; min-height: 420px; color: var(--muted); text-align: center; }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.42);
    display: grid;
    place-items: center;
    padding: 18px;
    overflow-y: auto;
    z-index: 20;
  }
  .modal {
    width: min(780px, 100%);
    max-height: calc(100vh - 36px);
    background: white;
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 18px;
    display: flex;
    flex-direction: column;
  }
  .modal-head, .modal-actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 14px 0;
    overflow-y: auto;
    padding-right: 4px;
  }
  .modal-actions {
    border-top: 1px solid var(--line);
    padding-top: 14px;
    margin-top: 4px;
    flex-shrink: 0;
  }
  label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; font-weight: 700; }
  .span-2 { grid-column: 1 / -1; }
  .hidden { display: none !important; }
  .toast, .loader {
    position: fixed;
    right: 18px;
    bottom: 18px;
    background: #101828;
    color: white;
    border-radius: 7px;
    padding: 12px 14px;
    z-index: 30;
  }
  .loader { left: 18px; right: auto; }

  @media (max-width: 1180px) {
    .filters { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .crm-grid { grid-template-columns: 320px minmax(0, 1fr); }
    .insights { grid-column: 1 / -1; min-height: 0; }
  }
  @media (max-width: 760px) {
    .app-shell { padding: 12px; }
    .topbar { align-items: stretch; flex-direction: column; }
    .filters, .crm-grid, .detail-grid, .edit-grid, .form-grid { grid-template-columns: 1fr; }
    .ticket-list, .ticket-detail, .insights { min-height: 0; max-height: none; }
    .wide, .span-2 { grid-column: auto; }
  }
</style>
